services:
  researcher:
    build:
      context: ..
      dockerfile: examples/researcher/Dockerfile
    ports:
      - "8101:8101"
    env_file:
      - ../.env
    volumes:
      - ./data/researcher:/app/.sessions

  architect:
    build:
      context: ..
      dockerfile: examples/architect/Dockerfile
    ports:
      - "8102:8102"
    env_file:
      - ../.env
    volumes:
      - ./data/architect:/app/.sessions

  coder:
    build:
      context: ..
      dockerfile: examples/coder/Dockerfile
    ports:
      - "8103:8103"
    env_file:
      - ../.env
    volumes:
      - ./data/coder:/app/.sessions

  reviewer:
    build:
      context: ..
      dockerfile: examples/reviewer/Dockerfile
    ports:
      - "8104:8104"
    env_file:
      - ../.env
    volumes:
      - ./data/reviewer:/app/.sessions

# Access control for the researcher agent
# Remove or modify rules as needed for your team

groups:
  admins:
    - slack_id: UXXXXXXXXXX
      name: Admin User

rules:
  # Shell commands require admin approval
  - tool: shell
    allow: admins
    require_approval: true
    approvers: admins

  # Everything else is open
  - tool: "*"
    allow: all
